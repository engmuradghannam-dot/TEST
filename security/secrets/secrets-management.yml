# Secrets Management for Nexus SaaS
# Supports Kubernetes Secrets, HashiCorp Vault, and AWS Secrets Manager

# Kubernetes Secrets (default)
# Secrets are stored in Kubernetes and mounted as environment variables
# or files in the pod.

# HashiCorp Vault (optional)
# To use Vault, set security.secrets.useVault=true in values.yaml
# Vault configuration:
vault:
  enabled: false
  address: "https://vault.nexus-saas.com"
  auth:
    method: kubernetes
    role: nexus-saas
  paths:
    database: "secret/data/nexus/database"
    stripe: "secret/data/nexus/stripe"
    sentry: "secret/data/nexus/sentry"
    jwt: "secret/data/nexus/jwt"

# AWS Secrets Manager (optional)
aws_secrets:
  enabled: false
  region: "us-east-1"
  secrets:
    - name: "nexus/database"
      env_prefix: "DB_"
    - name: "nexus/stripe"
      env_prefix: "STRIPE_"
    - name: "nexus/sentry"
      env_prefix: "SENTRY_"

# Secret Rotation Policy
rotation:
  enabled: true
  interval: "720h"  # 30 days
  # Secrets that should be rotated
  secrets:
    - django_secret_key
    - database_password
    - redis_password
    - stripe_webhook_secret

# Encryption
encryption:
  # At-rest encryption for database
  database:
    enabled: true
    provider: "aws-kms"  # or "gcp-kms", "azure-keyvault"
    key_id: "arn:aws:kms:us-east-1:123456789:key/12345678-1234-1234-1234-123456789012"

  # In-transit encryption
  tls:
    enabled: true
    min_version: "1.3"
    cipher_suites:
      - TLS_AES_256_GCM_SHA384
      - TLS_CHACHA20_POLY1305_SHA256
      - TLS_AES_128_GCM_SHA256
