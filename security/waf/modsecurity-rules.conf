# WAF Rules for Nexus SaaS
# Based on OWASP Core Rule Set

# SQL Injection Detection
SecRule REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_FILENAME|ARGS_NAMES|ARGS|XML:/* \
    "@rx (?i:(select\s*\*\s*from|union\s*select|insert\s*into|delete\s*from|drop\s*table|exec\s*\(|execute\s*\(|xp_cmdshell|benchmark\s*\(|sleep\s*\(|load_file\s*\())" \
    "id:1001,phase:2,deny,status:403,msg:'SQL Injection Attack Detected',logdata:'Matched Data: %{TX.0} found within %{MATCHED_VAR_NAME}: %{MATCHED_VAR}'"

# XSS Detection
SecRule REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_FILENAME|ARGS_NAMES|ARGS|XML:/* \
    "@rx (?i:(<script|javascript:|onerror=|onload=|onmouseover=|eval\s*\(|document\.cookie|document\.write|window\.location))" \
    "id:1002,phase:2,deny,status:403,msg:'Cross-Site Scripting Attack Detected'"

# CSRF Protection
SecRule REQUEST_METHOD "@streq POST" \
    "chain,id:1003,phase:2,deny,status:403,msg:'CSRF Token Missing'" \
    SecRule &REQUEST_HEADERS:X-CSRF-Token "@eq 0" \
    SecRule REQUEST_HEADERS:Content-Type "@contains application/json" \
    "chain" \
    SecRule REQUEST_URI "!@beginsWith /api/auth/"

# Rate Limiting Rules
SecAction "id:2001,phase:1,initcol:ip=%{REMOTE_ADDR},nolog"

SecRule IP:LOGIN_ATTEMPTS "@gt 5" \
    "id:2002,phase:2,deny,status:429,msg:'Rate Limit Exceeded: Too many login attempts',setvar:ip.login_attempts=+1"

SecRule IP:API_REQUESTS "@gt 100" \
    "id:2003,phase:2,deny,status:429,msg:'Rate Limit Exceeded: Too many API requests',setvar:ip.api_requests=+1"

# File Upload Security
SecRule REQUEST_FILENAME "@rx \.(php|php3|php4|php5|phtml|pl|py|jsp|asp|aspx|cgi|sh|bash)$" \
    "id:3001,phase:2,deny,status:403,msg:'Forbidden File Upload Extension'"

SecRule REQUEST_BODY "@rx Content-Disposition:.*filename="[^"]*\.(exe|dll|bat|cmd|sh|php|jsp|asp)"" \
    "id:3002,phase:2,deny,status:403,msg:'Malicious File Upload Detected'"

# Bot Detection
SecRule REQUEST_HEADERS:User-Agent "@rx (?i:(bot|crawler|spider|scraper|wget|curl|python-requests|scrapy))" \
    "id:4001,phase:1,deny,status:403,msg:'Automated Tool Detected'"

# Path Traversal
SecRule REQUEST_FILENAME "@rx \.{2,}[/\\]" \
    "id:5001,phase:1,deny,status:403,msg:'Path Traversal Attack Detected'"

# LFI/RFI Detection
SecRule ARGS "@rx (?i:(file://|ftp://|http://|https://|php://|data://|expect://|input://))" \
    "id:5002,phase:2,deny,status:403,msg:'Local/Remote File Inclusion Detected'"

# Sensitive Data Exposure
SecRule RESPONSE_BODY "@rx (?i:(password|secret|token|api_key|private_key|aws_access_key_id|aws_secret_access_key))" \
    "id:6001,phase:4,deny,status:500,msg:'Sensitive Data Exposure Detected'"
