version: '3.8'

# ═══════════════════════════════════════════
# Nexus SaaS - Docker Compose (Production)
# ═══════════════════════════════════════════

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_prod:/var/lib/postgresql/data
    networks:
      - nexus-prod
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_prod:/data
    networks:
      - nexus-prod
    restart: unless-stopped

  backend:
    image: ${REGISTRY}/nexus-saas-backend:${TAG:-latest}
    environment:
      ENVIRONMENT: production
      DJANGO_SETTINGS_MODULE: nexus.settings_prod
      SECRET_KEY: ${SECRET_KEY}
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      SENTRY_DSN: ${SENTRY_DSN}
    volumes:
      - media_prod:/app/media
    depends_on:
      - db
      - redis
    command: ["./entrypoint.sh", "web"]
    networks:
      - nexus-prod
    restart: unless-stopped
    deploy:
      replicas: 3

  celery-worker:
    image: ${REGISTRY}/nexus-saas-backend:${TAG:-latest}
    environment:
      ENVIRONMENT: production
      DJANGO_SETTINGS_MODULE: nexus.settings_prod
      SECRET_KEY: ${SECRET_KEY}
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - media_prod:/app/media
    depends_on:
      - db
      - redis
    command: ["./entrypoint.sh", "worker"]
    networks:
      - nexus-prod
    restart: unless-stopped
    deploy:
      replicas: 4

  celery-beat:
    image: ${REGISTRY}/nexus-saas-backend:${TAG:-latest}
    environment:
      ENVIRONMENT: production
      DJANGO_SETTINGS_MODULE: nexus.settings_prod
      SECRET_KEY: ${SECRET_KEY}
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - db
      - redis
    command: ["./entrypoint.sh", "beat"]
    networks:
      - nexus-prod
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - media_prod:/app/media
    depends_on:
      - backend
    networks:
      - nexus-prod
    restart: unless-stopped

volumes:
  postgres_prod:
  redis_prod:
  media_prod:

networks:
  nexus-prod:
    driver: bridge
