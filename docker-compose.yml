version: '3.8'

# ═══════════════════════════════════════════
# Nexus SaaS - Docker Compose (Development)
# ═══════════════════════════════════════════

services:
  # ── Database ───────────────────────────────
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB: nexus
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nexus

  # ── Redis ─────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nexus

  # ── Backend (Django + Gunicorn) ───────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    environment:
      ENVIRONMENT: development
      DJANGO_SETTINGS_MODULE: nexus.settings_dev
      SECRET_KEY: django-insecure-local-dev-key
      DB_HOST: db
      DB_NAME: nexus
      DB_USER: nexus
      DB_PASSWORD: nexus
      DB_PORT: "5432"
      REDIS_URL: "redis://redis:6379/1"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
      ALLOWED_HOSTS: "*"
      CORS_ALLOW_ALL_ORIGINS: "true"
      CREATE_SUPERUSER: "true"
      SUPERUSER_EMAIL: "admin@nexus.com"
      SUPERUSER_PASSWORD: "admin123"
    volumes:
      - ./backend:/app
      - media_files:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["./entrypoint.sh", "web"]
    networks:
      - nexus

  # ── Celery Worker ────────────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    environment:
      ENVIRONMENT: development
      DJANGO_SETTINGS_MODULE: nexus.settings_dev
      SECRET_KEY: django-insecure-local-dev-key
      DB_HOST: db
      DB_NAME: nexus
      DB_USER: nexus
      DB_PASSWORD: nexus
      DB_PORT: "5432"
      REDIS_URL: "redis://redis:6379/1"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
    volumes:
      - ./backend:/app
      - media_files:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["./entrypoint.sh", "worker"]
    deploy:
      replicas: 2
    networks:
      - nexus

  # ── Celery Beat (Scheduler) ───────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    environment:
      ENVIRONMENT: development
      DJANGO_SETTINGS_MODULE: nexus.settings_dev
      SECRET_KEY: django-insecure-local-dev-key
      DB_HOST: db
      DB_NAME: nexus
      DB_USER: nexus
      DB_PASSWORD: nexus
      DB_PORT: "5432"
      REDIS_URL: "redis://redis:6379/1"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["./entrypoint.sh", "beat"]
    networks:
      - nexus

  # ── Celery Flower (Monitor) ─────────────
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    environment:
      ENVIRONMENT: development
      DJANGO_SETTINGS_MODULE: nexus.settings_dev
      SECRET_KEY: django-insecure-local-dev-key
      REDIS_URL: "redis://redis:6379/1"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      FLOWER_USER: admin
      FLOWER_PASSWORD: admin
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - celery-worker
    command: ["./entrypoint.sh", "flower"]
    networks:
      - nexus

  # ── Frontend (React + Vite) ──────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
    environment:
      VITE_API_URL: "http://localhost:8000/api"
    volumes:
      - ./frontend:/build
      - /build/node_modules
    ports:
      - "3000:3000"
    command: >
      sh -c "npm run dev -- --host 0.0.0.0 --port 3000"
    networks:
      - nexus

  # ── Nginx (Reverse Proxy) ────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - media_files:/app/media
    depends_on:
      - backend
      - frontend
    networks:
      - nexus

  # ── Observability Stack ───────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./observability/prometheus/alerts.yml:/etc/prometheus/rules/alerts.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - nexus

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - grafana_data:/var/lib/grafana
    networks:
      - nexus

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - nexus

  tempo:
    image: grafana/tempo:latest
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./observability/tempo/tempo.yml:/etc/tempo.yaml
      - tempo_data:/tmp/tempo
    command: -config.file=/etc/tempo.yaml
    networks:
      - nexus

volumes:
  postgres_data:
  redis_data:
  media_files:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:

networks:
  nexus:
    driver: bridge
