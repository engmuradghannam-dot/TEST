# Nexus Event Architecture
# Apache Kafka + Event Sourcing + CQRS Pattern

apiVersion: v1
kind: Namespace
metadata:
  name: nexus-event-bus
  labels:
    app: nexus
    tier: event-bus

---
# Apache Kafka Cluster (Strimzi Operator)
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: nexus-kafka
  namespace: nexus-event-bus
spec:
  kafka:
    version: 3.6.0
    replicas: 5
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
      - name: external
        port: 9094
        type: nodeport
        tls: true
        authentication:
          type: tls
    authorization:
      type: simple
    config:
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
      num.partitions: 12
      log.retention.hours: 168
      log.segment.bytes: 1073741824
      log.retention.check.interval.ms: 300000
      auto.create.topics.enable: false
    storage:
      type: persistent-claim
      size: 500Gi
      class: gp3
    metricsConfig:
      type: jmxPrometheusExporter
      valueFrom:
        configMapKeyRef:
          name: kafka-metrics
          key: kafka-metrics-config.yml
    rack:
      topologyKey: topology.kubernetes.io/zone
    template:
      pod:
        affinity:
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchExpressions:
                    - key: strimzi.io/name
                      operator: In
                      values:
                        - nexus-kafka-kafka
                topologyKey: kubernetes.io/hostname
  zookeeper:
    replicas: 3
    storage:
      type: persistent-claim
      size: 50Gi
      class: gp3
  entityOperator:
    topicOperator: {}
    userOperator: {}
  cruiseControl:
    config:
      goals:
        - com.linkedin.kafka.cruisecontrol.analyzer.goals.RackAwareGoal
        - com.linkedin.kafka.cruisecontrol.analyzer.goals.ReplicaCapacityGoal
        - com.linkedin.kafka.cruisecontrol.analyzer.goals.DiskCapacityGoal

---
# Kafka Topics for Event Sourcing
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: nexus-events-domain
  namespace: nexus-event-bus
  labels:
    strimzi.io/cluster: nexus-kafka
spec:
  partitions: 12
  replicas: 3
  config:
    retention.ms: 604800000
    cleanup.policy: delete
    min.insync.replicas: 2

---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: nexus-events-commands
  namespace: nexus-event-bus
  labels:
    strimzi.io/cluster: nexus-kafka
spec:
  partitions: 6
  replicas: 3
  config:
    retention.ms: 86400000
    cleanup.policy: delete

---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: nexus-events-projections
  namespace: nexus-event-bus
  labels:
    strimzi.io/cluster: nexus-kafka
spec:
  partitions: 6
  replicas: 3
  config:
    retention.ms: 259200000
    cleanup.policy: compact
    min.compaction.lag.ms: 86400000

---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: nexus-events-notifications
  namespace: nexus-event-bus
  labels:
    strimzi.io/cluster: nexus-kafka
spec:
  partitions: 3
  replicas: 3
  config:
    retention.ms: 86400000
    cleanup.policy: delete

---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: nexus-events-audit
  namespace: nexus-event-bus
  labels:
    strimzi.io/cluster: nexus-kafka
spec:
  partitions: 3
  replicas: 3
  config:
    retention.ms: -1
    cleanup.policy: compact
    min.compaction.lag.ms: 604800000

---
# Kafka Connect for Event Streaming
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaConnect
metadata:
  name: nexus-connect
  namespace: nexus-event-bus
  annotations:
    strimzi.io/use-connector-resources: "true"
spec:
  version: 3.6.0
  replicas: 2
  bootstrapServers: nexus-kafka-kafka-bootstrap:9093
  tls:
    trustedCertificates:
      - secretName: nexus-kafka-cluster-ca-cert
        certificate: ca.crt
  authentication:
    type: tls
    certificateAndKey:
      secretName: nexus-kafka-connect
      certificate: user.crt
      key: user.key
  config:
    group.id: nexus-connect-cluster
    offset.storage.topic: nexus-connect-offsets
    config.storage.topic: nexus-connect-configs
    status.storage.topic: nexus-connect-status
    key.converter: org.apache.kafka.connect.json.JsonConverter
    value.converter: org.apache.kafka.connect.json.JsonConverter
    key.converter.schemas.enable: true
    value.converter.schemas.enable: true
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "4Gi"

---
# Debezium Connector for CDC (Change Data Capture)
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaConnector
metadata:
  name: nexus-postgres-connector
  namespace: nexus-event-bus
  labels:
    strimzi.io/cluster: nexus-connect
spec:
  class: io.debezium.connector.postgresql.PostgresConnector
  tasksMax: 4
  config:
    database.hostname: nexus-postgres-primary
    database.port: "5432"
    database.user: ${secrets:nexus-event-bus/nexus-db-credentials:username}
    database.password: ${secrets:nexus-event-bus/nexus-db-credentials:password}
    database.dbname: nexus
    database.server.name: nexus-postgres
    plugin.name: pgoutput
    slot.name: nexus_debezium_slot
    publication.name: nexus_publication
    table.include.list: public.*
    transforms: route
    transforms.route.type: org.apache.kafka.connect.transforms.RegexRouter
    transforms.route.regex: "([^.]+)\.([^.]+)\.([^.]+)"
    transforms.route.replacement: "nexus-cdc-$3"
    key.converter: org.apache.kafka.connect.json.JsonConverter
    value.converter: org.apache.kafka.connect.json.JsonConverter
    key.converter.schemas.enable: true
    value.converter.schemas.enable: true

---
# Event Store Service (Event Sourcing Aggregates)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-event-store
  namespace: nexus-event-bus
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nexus-event-store
  template:
    metadata:
      labels:
        app: nexus-event-store
    spec:
      containers:
        - name: event-store
          image: nexus-framework/event-store:v2.0.0
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9090
              name: grpc
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "nexus-kafka-kafka-bootstrap:9092"
            - name: EVENT_STORE_TYPE
              value: "kafka"
            - name: SNAPSHOT_FREQUENCY
              value: "100"
            - name: EVENT_RETENTION_DAYS
              value: "365"
            - name: GRPC_PORT
              value: "9090"
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          livenessProbe:
            grpc:
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5

---
# CQRS Read Model Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-read-model
  namespace: nexus-event-bus
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nexus-read-model
  template:
    metadata:
      labels:
        app: nexus-read-model
    spec:
      containers:
        - name: read-model
          image: nexus-framework/read-model:v2.0.0
          ports:
            - containerPort: 8080
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "nexus-kafka-kafka-bootstrap:9092"
            - name: READ_MODEL_DB_TYPE
              value: "elasticsearch"
            - name: ELASTICSEARCH_URL
              value: "http://nexus-elasticsearch:9200"
            - name: PROJECTION_UPDATE_MODE
              value: "async"
            - name: EVENT_CONSUMER_GROUP
              value: "nexus-read-model"
          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
            limits:
              memory: "8Gi"
              cpu: "4000m"

---
# Event Bus Service (Saga Orchestrator)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-saga-orchestrator
  namespace: nexus-event-bus
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexus-saga-orchestrator
  template:
    metadata:
      labels:
        app: nexus-saga-orchestrator
    spec:
      containers:
        - name: saga-orchestrator
          image: nexus-framework/saga-orchestrator:v2.0.0
          ports:
            - containerPort: 8080
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "nexus-kafka-kafka-bootstrap:9092"
            - name: SAGA_TIMEOUT_SECONDS
              value: "300"
            - name: SAGA_RETRY_MAX
              value: "5"
            - name: COMPENSATION_ENABLED
              value: "true"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"

---
# Schema Registry (Apicurio)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-schema-registry
  namespace: nexus-event-bus
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexus-schema-registry
  template:
    metadata:
      labels:
        app: nexus-schema-registry
    spec:
      containers:
        - name: schema-registry
          image: apicurio/apicurio-registry-mem:2.4.14.Final
          ports:
            - containerPort: 8080
          env:
            - name: REGISTRY_KAFKA_BOOTSTRAP_SERVERS
              value: "nexus-kafka-kafka-bootstrap:9092"
            - name: REGISTRY_STORAGE_KIND
              value: "kafka"
            - name: REGISTRY_KAFKA_TOPIC
              value: "nexus-schema-changes"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"

---
# Kafka Streams Application for Real-time Analytics
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-streams-analytics
  namespace: nexus-event-bus
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nexus-streams-analytics
  template:
    metadata:
      labels:
        app: nexus-streams-analytics
    spec:
      containers:
        - name: streams-app
          image: nexus-framework/streams-analytics:v2.0.0
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "nexus-kafka-kafka-bootstrap:9092"
            - name: APPLICATION_ID
              value: "nexus-analytics-streams"
            - name: PROCESSING_GUARANTEE
              value: "exactly_once_v2"
            - name: COMMIT_INTERVAL_MS
              value: "1000"
            - name: CACHE_MAX_BYTES_BUFFERING
              value: "10485760"
          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
            limits:
              memory: "8Gi"
              cpu: "4000m"

---
# Dead Letter Queue for Failed Events
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: nexus-events-dead-letter
  namespace: nexus-event-bus
  labels:
    strimzi.io/cluster: nexus-kafka
spec:
  partitions: 3
  replicas: 3
  config:
    retention.ms: 2592000000
    cleanup.policy: delete

---
# Event Replay Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-event-replay
  namespace: nexus-event-bus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nexus-event-replay
  template:
    metadata:
      labels:
        app: nexus-event-replay
    spec:
      containers:
        - name: event-replay
          image: nexus-framework/event-replay:v2.0.0
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "nexus-kafka-kafka-bootstrap:9092"
            - name: REPLAY_MODE
              value: "false"
            - name: REPLAY_FROM_OFFSET
              value: "earliest"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
