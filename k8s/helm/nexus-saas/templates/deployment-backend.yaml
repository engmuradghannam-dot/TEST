apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nexus-saas.fullname" . }}-backend
  labels:
    {{- include "nexus-saas.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "nexus-saas.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "nexus-saas.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "nexus-saas.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: backend
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.backend.repository }}:{{ .Values.image.backend.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            - name: metrics
              containerPort: 8000
              protocol: TCP
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: "nexus.settings"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "nexus-saas.fullname" . }}-db
                  key: url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "nexus-saas.fullname" . }}-redis
                  key: url
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "nexus-saas.fullname" . }}-secrets
                  key: django-secret-key
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "nexus-saas.fullname" . }}-stripe
                  key: secret-key
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "nexus-saas.fullname" . }}-sentry
                  key: dsn
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://{{ include "nexus-saas.fullname" . }}-tempo:4317"
            - name: OTEL_SERVICE_NAME
              value: "nexus-backend"
          envFrom:
            - configMapRef:
                name: {{ include "nexus-saas.fullname" . }}-config
          livenessProbe:
            httpGet:
              path: /health/
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources.backend | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: media
              mountPath: /app/media
      volumes:
        - name: tmp
          emptyDir: {}
        - name: media
          persistentVolumeClaim:
            claimName: {{ include "nexus-saas.fullname" . }}-media
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
