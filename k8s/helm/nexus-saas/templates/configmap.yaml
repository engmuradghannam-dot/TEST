apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nexus-saas.fullname" . }}-config
  labels:
    {{- include "nexus-saas.labels" . | nindent 4 }}
data:
  DEBUG: "false"
  ALLOWED_HOSTS: "*"
  CORS_ALLOWED_ORIGINS: "https://{{ .Values.ingress.hosts | first | pluck "host" | first }}"
  TENANT_MODEL: "tenants.Tenant"
  TENANT_DOMAIN_MODEL: "tenants.Domain"
  PUBLIC_SCHEMA_NAME: "{{ .Values.tenancy.publicSchema }}"
  CELERY_BROKER_URL: "redis://:{{ .Values.redis.auth.password }}@{{ include "nexus-saas.fullname" . }}-redis-master:6379/1"
  CELERY_RESULT_BACKEND: "redis://:{{ .Values.redis.auth.password }}@{{ include "nexus-saas.fullname" . }}-redis-master:6379/2"
  EMAIL_BACKEND: "django.core.mail.backends.smtp.EmailBackend"
  EMAIL_HOST: "smtp.sendgrid.net"
  EMAIL_PORT: "587"
  EMAIL_USE_TLS: "true"
  DEFAULT_FROM_EMAIL: "noreply@nexus-saas.com"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://{{ include "nexus-saas.fullname" . }}-tempo:4317"
  OTEL_SERVICE_NAME: "nexus-backend"
  OTEL_TRACES_SAMPLER: "parentbased_traceidratio"
  OTEL_TRACES_SAMPLER_ARG: "0.1"
