apiVersion: v2
name: nexus-saas
description: Nexus Framework SaaS - Multi-tenant ERP Platform
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - saas
  - erp
  - multi-tenant
  - django
  - react
home: https://github.com/engmuradghannam-dot/Nexus-Framework
sources:
  - https://github.com/engmuradghannam-dot/Nexus-Framework
maintainers:
  - name: Nexus Team
    email: team@nexus-framework.com
dependencies:
  - name: postgresql
    version: "13.2.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  - name: redis
    version: "18.6.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
  - name: ingress-nginx
    version: "4.8.0"
    repository: "https://kubernetes.github.io/ingress-nginx"
    condition: ingress-nginx.enabled
