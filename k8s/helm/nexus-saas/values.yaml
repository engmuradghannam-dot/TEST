# Default values for nexus-saas

replicaCount: 3

image:
  backend:
    repository: nexus-saas/backend
    pullPolicy: IfNotPresent
    tag: "latest"
  frontend:
    repository: nexus-saas/frontend
    pullPolicy: IfNotPresent
    tag: "latest"
  nginx:
    repository: nginx
    pullPolicy: IfNotPresent
    tag: "alpine"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8000"
  prometheus.io/path: "/metrics"
  loki.io/scrape: "true"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

service:
  type: ClusterIP
  backend:
    port: 8000
  frontend:
    port: 80
  nginx:
    port: 80

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: nexus-saas.local
      paths:
        - path: /
          pathType: Prefix
          service: frontend
        - path: /api
          pathType: Prefix
          service: backend
        - path: /admin
          pathType: Prefix
          service: backend
  tls:
    - secretName: nexus-saas-tls
      hosts:
        - nexus-saas.local
        - "*.nexus-saas.local"

resources:
  backend:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi
  frontend:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - nexus-saas
          topologyKey: kubernetes.io/hostname

# Database Configuration
postgresql:
  enabled: true
  auth:
    postgresPassword: "change-me"
    username: nexus
    password: "change-me"
    database: nexus_saas
  primary:
    persistence:
      enabled: true
      size: 50Gi
      storageClass: "fast-ssd"
    resources:
      limits:
        cpu: 2000m
        memory: 4Gi
      requests:
        cpu: 1000m
        memory: 2Gi
  readReplicas:
    replicaCount: 2
    resources:
      limits:
        cpu: 1000m
        memory: 2Gi
      requests:
        cpu: 500m
        memory: 1Gi

# Redis Configuration
redis:
  enabled: true
  auth:
    password: "change-me"
  architecture: replication
  replica:
    replicaCount: 2
  master:
    persistence:
      enabled: true
      size: 10Gi

# Celery Workers
celery:
  enabled: true
  worker:
    replicaCount: 2
    resources:
      limits:
        cpu: 500m
        memory: 1Gi
      requests:
        cpu: 250m
        memory: 512Mi
  beat:
    enabled: true
    resources:
      limits:
        cpu: 250m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi

# Observability
observability:
  prometheus:
    enabled: true
    retention: "15d"
    storage: 50Gi
  grafana:
    enabled: true
    adminPassword: "admin"
    storage: 10Gi
  loki:
    enabled: true
    storage: 30Gi
  tempo:
    enabled: true
    storage: 20Gi

# Security
security:
  rateLimiting:
    enabled: true
    requestsPerSecond: 100
    burst: 150
  waf:
    enabled: true
    rules:
      - SQL_INJECTION
      - XSS
      - CSRF
      - LFI
  secrets:
    useVault: false
    vaultAddress: ""
    vaultToken: ""

# Multi-tenancy
tenancy:
  publicSchema: "public"
  domainFormat: "{tenant}.nexus-saas.local"
  autoCreateSchema: true
  maxTenantsPerNode: 100

# Stripe Configuration
stripe:
  secretKey: ""
  webhookSecret: ""
  publishableKey: ""

# Sentry
sentry:
  dsn: ""
  environment: "production"
  tracesSampleRate: 0.1
