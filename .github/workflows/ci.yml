name: Nexus CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nexus_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-cov coverage

      - name: Run migrations
        env:
          DJANGO_SETTINGS_MODULE: nexus.settings_test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/nexus_test
          SECRET_KEY: test-secret-key
        run: |
          cd backend
          python manage.py migrate --no-input

      - name: Run tests with coverage
        env:
          DJANGO_SETTINGS_MODULE: nexus.settings_test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/nexus_test
          SECRET_KEY: test-secret-key
          CELERY_BROKER_URL: redis://localhost:6379/0
        run: |
          cd backend
          pytest tests/ tests/integration/ tests/e2e/ --cov=apps --cov-report=xml --cov-report=term

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage.xml

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: |
          pip install flake8 black isort

      - name: Run flake8
        run: |
          cd backend
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run black check
        run: |
          cd backend
          black --check .

      - name: Run isort check
        run: |
          cd backend
          isort --check-only .

  build:
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          docker-compose -f docker-compose.yml build

      - name: Push to registry (if configured)
        if: github.event_name == 'push'
        run: |
          echo "Docker push would happen here with registry credentials"

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Bandit security check
        run: |
          pip install bandit
          cd backend
          bandit -r . -f json -o bandit-report.json || true

      - name: Run safety check
        run: |
          pip install safety
          cd backend
          safety check || true
